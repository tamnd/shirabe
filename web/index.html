<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shirabe</title>
<script>
  // Set the theme before first paint so there is no flash.
  (function () {
    var t = localStorage.getItem("theme");
    if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    document.documentElement.dataset.theme = t;
  })();
</script>
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='16' y='24' font-size='22' text-anchor='middle' fill='%23c2502d' font-family='serif'%3E調%3C/text%3E%3C/svg%3E">
</head>
<body>

<header class="topbar">
  <a class="mark" href="/">調<em>べ</em></a>
  <div class="searchwrap">
    <form action="/search" autocomplete="off">
      <div class="searchbox">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
        <input id="q-top" name="q" type="search" placeholder="Search or paste a URL" spellcheck="false">
      </div>
    </form>
    <div class="suggest"><ul></ul></div>
  </div>
  <button class="theme-toggle" type="button" aria-label="Toggle theme">
    <svg class="sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
    <svg class="moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
  </button>
</header>

<section id="home" class="home">
  <div class="wordmark">
    <div class="kanji">調<em>べ</em></div>
    <p class="romaji">shirabe</p>
  </div>
  <div class="searchwrap">
    <form action="/search" autocomplete="off">
      <div class="searchbox">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
        <input id="q-home" name="q" type="search" placeholder="Search, or paste a URL" spellcheck="false" autofocus>
      </div>
    </form>
    <div class="suggest"><ul></ul></div>
  </div>
  <div class="home-hints">
    try <code>tokyo weather</code> <code>define serendipity</code> <code>stock AAPL</code> <code>!yt lofi</code> <code>!wiki alan turing</code>
  </div>
  <footer>every card from an open source · <a href="https://github.com/tamnd/shirabe" rel="noopener" target="_blank">github</a></footer>
</section>

<section id="results" class="results">
  <div class="layout">
    <div>
      <div id="main"></div>
      <div id="status"></div>
    </div>
    <aside id="rail" class="rail"></aside>
  </div>
</section>

<script type="module" src="/app.js"></script>
</body>
</html>
